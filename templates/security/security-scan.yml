name: security-scan
# Broad SAST+secret layer (claude-harness #19). TEMPLATE — replace the scoped source
# dirs (api core scripts ui server) with this project's roots before use.
on:
  pull_request:
  push:
    branches: [main, dev]
permissions:
  contents: read
jobs:
  gitleaks:
    name: gitleaks (committed secrets — hard fail)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          gitleaks version
      - run: gitleaks detect --no-git --redact -c .gitleaks.toml --source . --report-format sarif --report-path gitleaks.sarif --log-level error
  semgrep:
    name: semgrep (SAST — diff-aware, new findings fail)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install --upgrade pip semgrep
      - name: Diff-aware (PR) / informational (push)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          SCOPE="api core scripts ui server"   # <-- replace with project source roots
          if [ -n "$BASE_SHA" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true
            semgrep scan --config auto --baseline-commit "$BASE_SHA" --error --quiet $SCOPE; exit $?
          else
            semgrep scan --config auto --quiet $SCOPE | tail -40 || true
            echo "push: informational; PRs gate on NEW findings only."
          fi
